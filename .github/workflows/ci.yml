name: CI - Lint, Test, Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Qualità del codice
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        run: ruff check src/ tests/ scripts/

      - name: Run black format check
        run: black --check src/ tests/ scripts/

      - name: Run mypy type check
        run: mypy src/computer_graphics/ --ignore-missing-imports

  # ─────────────────────────────────────────────
  # Job 2: Test su matrice OS × Python
  # ─────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src/computer_graphics --cov-report=xml:coverage.xml --cov-report=term-missing --tb=short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Job 3: Security scan
  # ─────────────────────────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: |
          pip install -e ".[dev]"
          pip install bandit safety pip-audit

      - name: Run bandit (static security analysis)
        run: bandit -r src/ -ll -ii --skip B101

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit --desc on
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 4: Coverage report (badge-ready)
  # ─────────────────────────────────────────────
  coverage-report:
    name: Coverage Gate
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests and check coverage threshold
        run: |
          pytest tests/ \
            --cov=src/computer_graphics \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ─────────────────────────────────────────────
  # Job 5: Validate JSON fixtures
  # ─────────────────────────────────────────────
  validate-fixtures:
    name: Validate Test Fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON fixtures
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          fixtures = list(Path('tests/fixtures').glob('*.json'))
          errors = []
          for f in fixtures:
              try:
                  json.loads(f.read_text())
                  print(f'✓ {f.name}')
              except json.JSONDecodeError as e:
                  errors.append(f'✗ {f.name}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'Tutti i {len(fixtures)} fixture JSON sono validi.')
          "
