version: "3.9"

services:
  # Pipeline NL → JSON
  computer-graphics:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: computer_graphics_pipeline
    environment:
      - OLLAMA_URL=http://ollama:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - computer_graphics_net
    command: >
      python scripts/run_pipeline.py
      "una stanza con tavolo, sedia e lampada"
      --output /app/output/scene_objects.json
      --model llama3

  # Server Ollama locale
  ollama:
    image: ollama/ollama:latest
    container_name: computer_graphics_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - computer_graphics_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
    driver: local

networks:
  computer_graphics_net:
    driver: bridge