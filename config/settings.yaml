# Configurazione principale di NL2Scene3D v2
# I valori possono essere sovrascritti da variabili d'ambiente

ollama:
  url: "http://localhost:11434"
  model: null
  timeout: 180
  max_connection_retries: 3
  retry_delay: 2.0
  options:
    temperature: 0.2
    top_p: 0.9
    num_predict: 1024

# Provider LLM: "ollama", "gemini", "openai"
llm:
  provider: "ollama"
  # Per Gemini: impostare GEMINI_API_KEY come variabile d'ambiente
  api_key: null
  # Modello Gemini da usare (aggiornare quando disponibili versioni piu recenti)
  model: "gemini-3.1-flash"
  base_url: null

pipeline:
  max_retries: 3
  verbose: true
  # Abilita il ConstraintSolver deterministico (raccomandato)
  use_constraint_solver: true

paths:
  assets_dir: "assets/models"
  render_output_dir: "assets/renders"
  prompt_file: "config/prompts/system_prompt.txt"

blender:
  render_engine: "CYCLES"  # CYCLES o BLENDER_EEVEE
  resolution_x: 1920
  resolution_y: 1080
  samples: 64
  camera_location: [7.0, -7.0, 5.0]

validation:
  min_description_length: 10
  max_description_length: 2000
  max_coordinate_value: 50.0

room_mode:
  enabled: false
  margin: 2.0
  wall_height: 3.0
  ceiling: false

# Configurazione Poly Haven
poly_haven:
  # Qualita dei modelli: "1k", "2k", "4k"
  quality: "2k"
  # Directory cache per gli asset scaricati (relativa a assets_dir)
  cache_subdir: "polyhaven"
  # Scarica automaticamente HDRI per l'illuminazione
  auto_hdri: false
  hdri_category: "indoor"

# Configurazione Critic Loop
critic_loop:
  # Numero massimo di iterazioni del feedback loop visivo
  max_iterations: 2
  # Soglia minima di correzioni per considerare il loop convergente
  convergence_threshold: 0