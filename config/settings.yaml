# Configurazione principale di NL2Scene3D
# I valori possono essere sovrascritti da variabili d'ambiente

ollama:
  url: "http://localhost:11434"
  model: null
  timeout: 180
  max_connection_retries: 3
  retry_delay: 2.0
  options:
    temperature: 0.2
    top_p: 0.9
    num_predict: 1024

pipeline:
  max_retries: 3
  verbose: true

paths:
  assets_dir: "assets/models"
  render_output_dir: "assets/renders"
  prompt_file: "config/prompts/system_prompt.txt"

blender:
  render_engine: "CYCLES"    # CYCLES o BLENDER_EEVEE
  resolution_x: 1920
  resolution_y: 1080
  samples: 64
  camera_location: [7.0, -7.0, 5.0]

validation:
  min_description_length: 10
  max_description_length: 2000
  max_coordinate_value: 50.0
